services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: haive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-haive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haive_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-haive}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-haive} -d ${POSTGRES_DB:-haive}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - haive-network

  redis:
    image: redis:8.4-alpine
    container_name: haive-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - haive-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: haive-mailpit
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit_data:/data
    networks:
      - haive-network

  ollama:
    image: ollama/ollama:latest
    container_name: haive-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - haive-network

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: haive-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-haive}:${POSTGRES_PASSWORD:-haive_dev_password}@postgres:5432/${POSTGRES_DB:-haive}
      REDIS_URL: redis://redis:6379
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-1d}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-no-reply@haive.local}
      HOST_REPO_ROOT: /host-fs
      REPO_STORAGE_ROOT: /var/lib/haive/repos
      BUNDLE_STORAGE_ROOT: /var/lib/haive/bundles
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ${HOST_REPO_ROOT:-${HOME}}:/host-fs:ro
      - haive_repos:/var/lib/haive/repos
      - haive_bundles:/var/lib/haive/bundles
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    networks:
      - haive-network

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    container_name: haive-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-haive}:${POSTGRES_PASSWORD:-haive_dev_password}@postgres:5432/${POSTGRES_DB:-haive}
      REDIS_URL: redis://redis:6379
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
      CLAWKER_BIN: ${CLAWKER_BIN:-/usr/local/bin/clawker}
      SANDBOX_NETWORK: ${SANDBOX_NETWORK:-haive-network}
      DOCKER_HOST: unix:///var/run/docker.sock
      HOST_REPO_ROOT: /host-fs
      HOST_REPO_ROOT_REAL: ${HOST_REPO_ROOT:-${HOME}}
      REPO_STORAGE_ROOT: /var/lib/haive/repos
      BUNDLE_STORAGE_ROOT: /var/lib/haive/bundles
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ${HOST_REPO_ROOT:-${HOME}}:/host-fs
      - haive_repos:/var/lib/haive/repos
      - haive_bundles:/var/lib/haive/bundles
      - haive_wrappers:/var/lib/haive/wrappers
      - haive_squid_configs:/var/lib/haive/squid-configs
    networks:
      - haive-network

  cli-sandbox:
    build:
      context: ./packages/worker/sandbox-image
      dockerfile: Dockerfile
      args:
        RTK_RELEASE_VERSION: ${RTK_RELEASE_VERSION:-v0.37.2}
        RTK_X86_64_MUSL_SHA256: ${RTK_X86_64_MUSL_SHA256:-3dfb7a05636a68687ba1c5aa696fa8d5fcb494447ded86d9eb8b88b7100a37c6}
    image: haive-cli-sandbox:latest
    profiles: ["sandbox"]
    command: ["true"]

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: haive-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      API_URL_INTERNAL: ${API_URL_INTERNAL:-http://api:3001}
    networks:
      - haive-network

networks:
  haive-network:
    driver: bridge
    name: haive-network

volumes:
  postgres_data:
  redis_data:
  mailpit_data:
  ollama_data:
  haive_repos:
    name: haive_repos
  haive_bundles:
    name: haive_bundles
  haive_wrappers:
    name: haive_wrappers
  haive_squid_configs:
    name: haive_squid_configs
