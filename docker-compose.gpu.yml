# GPU override for Ollama. Included automatically by scripts/dev-up.sh (pnpm
# docker:dev) only when an NVIDIA GPU AND the nvidia container runtime are present.
# Kept out of the base + dev compose so the stack boots on any host (CPU Ollama);
# this layers GPU access on top. A multi-billion-parameter embedding model is far
# faster on GPU. Requires the NVIDIA Container Toolkit on the host.
#
# By default Ollama uses ALL detected NVIDIA GPUs. On a multi-GPU host, pin it to
# a single card by index or UUID via OLLAMA_GPU_DEVICE in .env (e.g.
# OLLAMA_GPU_DEVICE=1 or OLLAMA_GPU_DEVICE=GPU-<uuid>). CPU-only machines never
# load this file (dev-up.sh gates it), so the automatic CPU fallback is unaffected.
services:
  ollama:
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: ${OLLAMA_GPU_DEVICE:-all}
