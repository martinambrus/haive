# Dependabot configuration — https://docs.github.com/code-security/dependabot
version: 2
updates:
  # JavaScript/TypeScript dependencies. One entry at the workspace root:
  # Dependabot reads the root pnpm-lock.yaml and updates every workspace
  # package (packages/*) from it.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # GitHub Actions pinned in the CI workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Base images in the service Dockerfiles.
  - package-ecosystem: docker
    directories:
      - "/packages/api"
      - "/packages/worker"
      - "/packages/web"
      - "/docker/ollama-thinking-proxy"
    schedule:
      interval: weekly
